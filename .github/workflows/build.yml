name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm run test:run

      - name: Build Electrobun App
        run: npm run build

      - name: Windows Packaging Smoke Test
        if: matrix.os == 'windows-latest'
        run: npm run package

      - name: Assert Windows package artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $expected = @(
            "artifacts-electrobun/stable-win-x64-LiquiTask-Setup.zip",
            "artifacts-electrobun/stable-win-x64-LiquiTask.tar.zst",
            "artifacts-electrobun/stable-win-x64-update.json"
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              Write-Error "Missing expected artifact: $path"
              exit 1
            }
          }

      - name: Upload Web Build Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: liquitask-web-build
          path: dist
          if-no-files-found: error
