name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --no-deprecation

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Universal)
            os: macos-14
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
            artifact-name: liquitask-release-macos
            artifact-path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-2025-vs2026
            rust-targets: ''
            tauri-args: ''
            artifact-name: liquitask-release-windows
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false

      - name: Run Type Check
        run: npm run typecheck

      - name: Run Tests
        run: npm run test:run

      # Only inject the Apple signing/notarization vars when a real certificate
      # secret is configured. They must be *absent* (not empty) otherwise: Tauri
      # treats a present-but-empty APPLE_CERTIFICATE as a cert to import and fails
      # at `security import`. With them unset, the build falls back to the ad-hoc
      # `signingIdentity: "-"` in tauri.macos.conf.json (still a valid signature).
      - name: Configure macOS signing
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Developer ID certificate present — enabling signing + notarization."
            {
              echo "APPLE_CERTIFICATE<<__EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No Apple certificate secret — using ad-hoc signing from tauri.macos.conf.json."
          fi

      - name: Build Tauri App
        run: npm run tauri build -- ${{ matrix.tauri-args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: ignore
