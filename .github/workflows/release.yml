name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag in vX.Y.Z format'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --no-deprecation

jobs:
  release:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2025-vs2026
            rust-targets: ''
            package-command: npm run build
            artifact-name: liquitask-release-windows
            artifact-path: src-tauri/target/release/bundle/nsis/*.exe
            release-files: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            os: macos-14
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            package-command: npm run build:mac
            artifact-name: liquitask-release-macos
            artifact-path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            release-files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is empty"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "${{ steps.release_tag.outputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag ${TAG} does not match package version v${VERSION}"
            exit 1
          fi

      # See build.yml: inject Apple signing vars only when a real certificate
      # secret exists, otherwise the build ad-hoc signs from tauri.macos.conf.json.
      - name: Configure macOS signing
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Developer ID certificate present — enabling signing + notarization."
            {
              echo "APPLE_CERTIFICATE<<__EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No Apple certificate secret — using ad-hoc signing from tauri.macos.conf.json."
          fi

      - name: Build and Package Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.package-command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: LiquiTask ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: ${{ matrix.release-files }}
