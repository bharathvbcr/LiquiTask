name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag in vX.Y.Z format'
        required: true
        default: 'v1.0.2'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Release Ref
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: git checkout "${{ steps.release_tag.outputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
        cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm test -- --run

      - name: Verify Tag Matches Version
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package version v${VERSION}"
            exit 1
          fi

      - name: Package Electrobun Release
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquitask-release-windows
          path: artifacts-electrobun/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: LiquiTask ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts-electrobun/stable-win-x64-LiquiTask-Setup.zip
            artifacts-electrobun/stable-win-x64-LiquiTask.tar.zst
            artifacts-electrobun/stable-win-x64-update.json
