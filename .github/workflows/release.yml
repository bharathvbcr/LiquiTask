name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag in vX.Y.Z format"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is empty"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag ${TAG} does not match package version v${VERSION}"
            exit 1
          fi

      - name: Package release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package

      - name: Assert release package artifacts
        shell: pwsh
        run: |
          $expected = @(
            "artifacts-electrobun/stable-win-x64-LiquiTask-Setup.zip",
            "artifacts-electrobun/stable-win-x64-LiquiTask.tar.zst",
            "artifacts-electrobun/stable-win-x64-update.json"
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              Write-Error "Missing expected release artifact: $path"
              exit 1
            }
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquitask-release-windows
          path: artifacts-electrobun/*
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: LiquiTask ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts-electrobun/stable-win-x64-LiquiTask-Setup.zip
            artifacts-electrobun/stable-win-x64-LiquiTask.tar.zst
            artifacts-electrobun/stable-win-x64-update.json
