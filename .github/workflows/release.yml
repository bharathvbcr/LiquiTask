name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag in vX.Y.Z format'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package-command: npm run build
            artifact-name: liquitask-release-windows
            artifact-path: release/*.exe
            release-files: release/*.exe
          - name: macOS
            os: macos-latest
            package-command: npm run build:web && npm run build:electron && npx electron-builder --mac dmg --x64 --arm64
            artifact-name: liquitask-release-macos
            artifact-path: release/*.dmg
            release-files: release/*.dmg

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is empty"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "${{ steps.release_tag.outputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag ${TAG} does not match package version v${VERSION}"
            exit 1
          fi

      - name: Build and Package Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'false' || '' }}
        run: ${{ matrix.package-command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: LiquiTask ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: ${{ matrix.release-files }}
