name: Watch ElectroBun Release

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch-electrobun:
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream ElectroBun fix status
        uses: actions/github-script@v7
        with:
          script: |
            const owner = "blackboardsh";
            const repo = "electrobun";
            const prNumber = 299;
            const issueNumber = 298;
            const localOwner = context.repo.owner;
            const localRepo = context.repo.repo;
            const trackingTitle = "Remove local ElectroBun wrapper after upstream Windows rcedit fix release";

            const [pr, issue, releases] = await Promise.all([
              github.rest.pulls.get({ owner, repo, pull_number: prNumber }),
              github.rest.issues.get({ owner, repo, issue_number: issueNumber }),
              github.rest.repos.listReleases({ owner, repo, per_page: 10 }),
            ]);

            const merged = Boolean(pr.data.merged_at);
            const latestRelease = releases.data.find((release) => !release.draft && !release.prerelease) || null;
            const latestTag = latestRelease?.tag_name || "none";
            const latestBody = `${latestRelease?.name || ""}\n${latestRelease?.body || ""}`;
            const mentionsFix =
              latestBody.includes("#299") ||
              latestBody.includes("299") ||
              latestBody.includes("rcedit") ||
              latestBody.includes("icon embedding");

            const shouldOpenTrackingIssue = merged && Boolean(latestRelease) && mentionsFix;

            const existingIssues = await github.rest.issues.listForRepo({
              owner: localOwner,
              repo: localRepo,
              state: "open",
              per_page: 100,
            });

            const existing = existingIssues.data.find((item) => item.title === trackingTitle);

            const summary = [
              `Upstream issue: ${issue.data.html_url}`,
              `Upstream PR: ${pr.data.html_url}`,
              `PR merged: ${merged ? `yes (${pr.data.merged_at})` : "no"}`,
              `Latest stable release: ${latestTag}`,
              `Release looks related: ${mentionsFix ? "yes" : "no"}`,
            ].join("\n");

            core.summary
              .addHeading("ElectroBun Watch")
              .addCodeBlock(summary)
              .write();

            if (!shouldOpenTrackingIssue) {
              core.info("No local tracking issue needed yet.");
              return;
            }

            const body = [
              "The upstream ElectroBun Windows `rcedit` fix appears to be merged and released.",
              "",
              `- Upstream issue: ${issue.data.html_url}`,
              `- Upstream PR: ${pr.data.html_url}`,
              `- Merge date: ${pr.data.merged_at}`,
              `- Latest stable release: ${latestRelease.html_url}`,
              "",
              "Local cleanup to perform:",
              "",
              "1. Upgrade `electrobun` to the released fixed version.",
              "2. Remove `scripts/electrobun.cjs`.",
              "3. Remove `.electrobun-shims/powershell.cmd` if no longer needed.",
              "4. Switch package scripts back to direct `electrobun` commands.",
              "5. Re-run Windows packaging smoke checks.",
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner: localOwner,
                repo: localRepo,
                issue_number: existing.number,
                body: `Watcher check on ${new Date().toISOString()}:\n\n${body}`,
              });
              core.info(`Updated existing tracking issue #${existing.number}.`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: localOwner,
              repo: localRepo,
              title: trackingTitle,
              body,
            });

            core.info(`Created tracking issue #${created.data.number}.`);
